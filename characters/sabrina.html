<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sabrina | StarSundae Character Hub</title>

<link rel="stylesheet" href="../style.css">
</head>

<body>

<header>
    <h1 id="characterName">Loading...</h1>
    <p id="characterSpecies"></p>
</header>

<main class="profile-page">

    <section class="profile-card">
        <img id="mainRef" class="main-ref" src="../images/placeholder.png" alt="Character reference">

        <div class="profile-info">
            <h2>Profile</h2>

            <p><strong>Species:</strong> <span id="species"></span></p>
            <p><strong>Gender:</strong> <span id="gender"></span></p>
            <p><strong>Age:</strong> <span id="age"></span></p>
            <p><strong>Occupation:</strong> <span id="occupation"></span></p>

            <h2>Introduction</h2>
            <p id="introduction"></p>

            <h2>Summary</h2>
            <p id="summary"></p>
        </div>
    </section>

    <section class="gallery-section">
        <h2>Gallery</h2>
        <div id="gallery" class="gallery-grid"></div>
    </section>

</main>

<script>
const API_URL = "https://charahub.crysthigpen.workers.dev";
const SLUG = "sabrina";

async function loadCharacter() {
    const response = await fetch(`${API_URL}/character/${SLUG}`);
    const character = await response.json();

    document.title = `${character.name} | StarSundae Character Hub`;

    document.getElementById("characterName").textContent = character.name;
    document.getElementById("characterSpecies").textContent = character.species;

    document.getElementById("species").textContent = character.species || "—";
    document.getElementById("gender").textContent = character.gender || "—";
    document.getElementById("age").textContent = character.age || "—";
    document.getElementById("occupation").textContent = character.occupation || "—";

    document.getElementById("introduction").textContent = character.introduction || "No introduction yet.";
    document.getElementById("summary").textContent = character.summary || "No summary yet.";

    document.getElementById("mainRef").src = character.mainRef || character.icon || "../images/placeholder.png";

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    if (character.gallery && character.gallery.length) {
        character.gallery.forEach(image => {
            gallery.innerHTML += `<img src="${image}" alt="${character.name} gallery image">`;
        });
    } else {
        gallery.innerHTML = "<p>No gallery images yet.</p>";
    }
}

loadCharacter();
</script>

</body>
</html>
