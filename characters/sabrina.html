<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabrina | StarSundae Character Hub</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<header class="character-header">
    <a class="back-button" href="../index.html">← Back to Hub</a>
    <h1 id="characterName">Loading...</h1>
    <p id="characterSpecies"></p>
</header>

<main class="profile-page">

    <section class="profile-card">
        <img id="mainRef" class="main-ref" src="../images/placeholder.png" alt="Character reference">

        <aside class="quick-facts">
            <h2>Quick Facts</h2>
            <p><strong>Species:</strong> <span id="species">—</span></p>
            <p><strong>Gender:</strong> <span id="gender">—</span></p>
            <p><strong>Age:</strong> <span id="age">—</span></p>
            <p><strong>Occupation:</strong> <span id="occupation">—</span></p>
            <p><strong>Folder:</strong> <span id="folder">—</span></p>

            <h3>Tags</h3>
            <div id="tags" class="tag-list"></div>
        </aside>
    </section>

    <nav class="tabs">
        <button class="tab-button active" data-tab="overview">Overview</button>
        <button class="tab-button" data-tab="gallery">Gallery</button>
        <button class="tab-button" data-tab="lore">Lore</button>
    </nav>

    <section id="overview" class="tab-panel active">
        <div class="content-grid">
            <div class="content-card">
                <h2>Introduction</h2>
                <p id="introduction">—</p>
            </div>

            <div class="content-card">
                <h2>Summary</h2>
                <p id="summary">—</p>
            </div>

            <div class="content-card">
                <h2>Personality</h2>
                <p id="personality">—</p>
            </div>

            <div class="content-card">
                <h2>Likes</h2>
                <div id="likes" class="tag-list"></div>
            </div>

            <div class="content-card">
                <h2>Dislikes</h2>
                <div id="dislikes" class="tag-list"></div>
            </div>

            <div class="content-card">
                <h2>Hobbies</h2>
                <div id="hobbies" class="tag-list"></div>
            </div>

            <div class="content-card">
                <h2>Fears</h2>
                <div id="fears" class="tag-list"></div>
            </div>
        </div>
    </section>

    <section id="gallery" class="tab-panel">
        <div class="section-title">
            <h2>Gallery</h2>
            <p>Click any image to view it full size.</p>
        </div>
        <div id="galleryGrid" class="gallery-grid">
            <p>Loading gallery...</p>
        </div>
    </section>

    <section id="lore" class="tab-panel">
        <div class="content-grid">
            <div class="content-card">
                <h2>Trivia</h2>
                <p id="trivia">—</p>
            </div>

            <div class="content-card">
                <h2>Quote</h2>
                <p id="quotes">—</p>
            </div>
        </div>
    </section>

</main>

<div id="lightbox" class="lightbox">
    <button id="lightboxClose" class="lightbox-close">×</button>
    <img id="lightboxImage" src="" alt="Full-size image">
</div>

<script>
const API_URL = "https://charahub.crysthigpen.workers.dev";
const SLUG = "sabrina";

function getImage(path) {
    if (!path) return "../images/placeholder.png";
    path = String(path).trim();
    if (path.startsWith("http")) return path;
    if (path.startsWith("/")) return window.location.origin + path;
    return window.location.origin + "/" + path;
}

function setText(id, value, fallback = "—") {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = value && String(value).trim() ? value : fallback;
}

function renderTags(id, items) {
    const box = document.getElementById(id);
    if (!box) return;
    box.innerHTML = "";

    if (!items || !Array.isArray(items) || items.length === 0) {
        box.innerHTML = '<span class="tag">—</span>';
        return;
    }

    items.forEach(item => {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = item;
        box.appendChild(span);
    });
}

function renderImages(images, name) {
    const grid = document.getElementById("galleryGrid");
    grid.innerHTML = "";

    if (!images || !Array.isArray(images) || images.length === 0) {
        grid.innerHTML = "<p>No gallery images yet.</p>";
        return;
    }

    images.forEach(item => {
        const src = typeof item === "string" ? item : item.url;
        if (!src) return;

        const card = document.createElement("div");
        card.className = "image-card";

        const img = document.createElement("img");
        img.src = getImage(src);
        img.alt = `${name || "Character"} gallery image`;
        img.addEventListener("click", () => openLightbox(getImage(src)));

        card.appendChild(img);
        grid.appendChild(card);
    });
}

function setupTabs() {
    document.querySelectorAll(".tab-button").forEach(button => {
        button.addEventListener("click", () => {
            document.querySelectorAll(".tab-button").forEach(b => b.classList.remove("active"));
            document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
            button.classList.add("active");
            document.getElementById(button.dataset.tab).classList.add("active");
        });
    });
}

function openLightbox(src) {
    document.getElementById("lightboxImage").src = src;
    document.getElementById("lightbox").classList.add("active");
}

function closeLightbox() {
    document.getElementById("lightbox").classList.remove("active");
    document.getElementById("lightboxImage").src = "";
}

async function loadCharacter() {
    try {
        const res = await fetch(`${API_URL}/character/${SLUG}`);
        const character = await res.json();

        setText("characterName", character.name, "Sabrina");
        setText("characterSpecies", character.species, "");
        document.title = `${character.name || "Sabrina"} | StarSundae Character Hub`;

        setText("species", character.species);
        setText("gender", character.gender);
        setText("age", character.age);
        setText("occupation", character.occupation);
        setText("folder", character.folder);

        setText("introduction", character.introduction, "No introduction yet.");
        setText("summary", character.summary, "No summary yet.");
        setText("personality", character.personality, "No personality notes yet.");
        setText("trivia", character.trivia, "No trivia yet.");
        setText("quotes", character.quotes, "No quote yet.");

        renderTags("tags", character.tags);
        renderTags("likes", character.likes);
        renderTags("dislikes", character.dislikes);
        renderTags("hobbies", character.hobbies);
        renderTags("fears", character.fears);

        document.getElementById("mainRef").src = getImage(character.mainRef || character.icon);
        renderImages(character.gallery, character.name);

    } catch (err) {
        console.error(err);
        setText("characterName", "Unable to load character");
    }
}

document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
document.getElementById("lightbox").addEventListener("click", e => {
    if (e.target.id === "lightbox") closeLightbox();
});

setupTabs();
loadCharacter();
</script>

</body>
</html>
