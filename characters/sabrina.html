<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sabrina | StarSundae Character Hub</title>

<link rel="stylesheet" href="../style.css">
</head>

<body>

<header class="character-header centered-header">
    <a class="back-button" href="../index.html">← Back to Hub</a>

    <h1 id="characterName">Loading...</h1>
    <p id="characterSpecies"></p>
</header>

<main class="profile-page">

    <section class="profile-card">
        <img id="mainRef" class="main-ref" src="../images/placeholder.png" alt="Character reference">

        <div class="profile-info">
            <h2>Profile</h2>

            <p><strong>Species:</strong> <span id="species"></span></p>
            <p><strong>Gender:</strong> <span id="gender"></span></p>
            <p><strong>Age:</strong> <span id="age"></span></p>
            <p><strong>Occupation:</strong> <span id="occupation"></span></p>

            <h2>Introduction</h2>
            <p id="introduction"></p>

            <h2>Summary</h2>
            <p id="summary"></p>
        </div>
    </section>

    <section class="gallery-section">
        <h2>Gallery</h2>
        <div id="gallery" class="gallery-grid">
            <p>Loading gallery...</p>
        </div>
    </section>

</main>

<script>
const API_URL = "https://charahub.crysthigpen.workers.dev";
const SLUG = "sabrina";

function getImage(path) {
    if (!path) return "../images/placeholder.png";

    path = String(path).trim();

    if (path.startsWith("http")) return path;

    if (path.startsWith("/")) {
        return window.location.origin + path;
    }

    return window.location.origin + "/" + path;
}

async function loadCharacter() {
    try {
        const response = await fetch(`${API_URL}/character/${SLUG}`);
        const character = await response.json();

        if (character.error) {
            document.getElementById("characterName").textContent = "Character not found";
            document.getElementById("characterSpecies").textContent = character.error;
            return;
        }

        document.title = `${character.name} | StarSundae Character Hub`;

        document.getElementById("characterName").textContent = character.name || "Unnamed Character";
        document.getElementById("characterSpecies").textContent = character.species || "";

        document.getElementById("species").textContent = character.species || "—";
        document.getElementById("gender").textContent = character.gender || "—";
        document.getElementById("age").textContent = character.age || "—";
        document.getElementById("occupation").textContent = character.occupation || "—";

        document.getElementById("introduction").textContent = character.introduction || "No introduction yet.";
        document.getElementById("summary").textContent = character.summary || "No summary yet.";

        const mainRef = document.getElementById("mainRef");
        mainRef.src = getImage(character.mainRef || character.icon || "images/placeholder.png");
        mainRef.alt = `${character.name || "Character"} reference`;

        const gallery = document.getElementById("gallery");
        gallery.innerHTML = "";

        if (character.gallery && character.gallery.length > 0) {
            character.gallery.forEach(image => {
                const img = document.createElement("img");
                img.src = getImage(image);
                img.alt = `${character.name || "Character"} gallery image`;
                gallery.appendChild(img);
            });
        } else {
            gallery.innerHTML = "<p>No gallery images yet.</p>";
        }

    } catch (error) {
        console.error("Character page error:", error);
        document.getElementById("characterName").textContent = "Unable to load character";
        document.getElementById("characterSpecies").textContent = "Check your Worker URL or Notion data.";
        document.getElementById("gallery").innerHTML = "<p>Gallery could not load.</p>";
    }
}

loadCharacter();
</script>

</body>
</html>
