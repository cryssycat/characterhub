<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LunaHub World</title>

<link rel="stylesheet" href="../style.css?v=100">
</head>

<body>

<header class="site-header world-header">
    <nav class="wiki-links world-top-nav">
        <a href="../index.html">🏠 Back to Hub</a>
        <a href="../worlds/index.html">🌎 Back to Worlds</a>
    </nav>

    <div id="worldHeaderContent">
        <p class="loading">Loading world...</p>
    </div>
</header>

<main class="world-page-wrap">

    <section id="worldMainCard" class="profile-card world-main-card hidden"></section>

    <section id="worldDetailsGrid" class="world-details-grid hidden"></section>

    <section class="profile-card world-character-section">
        <h2>Characters in this World</h2>
        <p id="worldCharacterCount" class="character-count">Loading characters...</p>
        <div id="worldCharacters" class="character-grid">
            <p class="loading">Loading characters...</p>
        </div>
    </section>

</main>

<script>
// ==========================================
// SHARED WORLD PAGE
// Uses shared world database + BOTH StarHub and LunaHub character databases
// ==========================================

const WORLDS_ENDPOINT =
  "https://charahub.crysthigpen.workers.dev/worlds";

const STAR_CHARACTERS_ENDPOINT =
  "https://charahub.crysthigpen.workers.dev/characters";

const LUNA_CHARACTERS_ENDPOINT =
  "https://lunabreww.crysthigpen.workers.dev/characters";

const CHARACTER_SOURCES = [
    {
        hub: "StarHub",
        label: "⭐ Star",
        endpoint: STAR_CHARACTERS_ENDPOINT,
        characterPath: "../characters/index.html"
    },
    {
        hub: "LunaHub",
        label: "🌙 Luna",
        endpoint: LUNA_CHARACTERS_ENDPOINT,
        characterPath: "../characters/index.html"
    }
];

const params = new URLSearchParams(window.location.search);
const currentSlug = params.get("slug") || params.get("world") || "";

const worldHeaderContent = document.getElementById("worldHeaderContent");
const worldMainCard = document.getElementById("worldMainCard");
const worldDetailsGrid = document.getElementById("worldDetailsGrid");
const worldCharacters = document.getElementById("worldCharacters");
const worldCharacterCount = document.getElementById("worldCharacterCount");

let currentWorld = null;
let allCharacters = [];

function getImage(path, fallback = "../images/placeholder.png") {
    if (!path) return fallback;

    path = String(path).trim();

    if (path.startsWith("http")) return path;

    if (path.startsWith("/")) {
        return window.location.origin + path;
    }

    return window.location.origin + "/" + path;
}

function cleanText(value) {
    if (value === null || value === undefined) return "";
    if (Array.isArray(value)) return value.filter(Boolean).join(", ");
    return String(value).trim();
}

function normalize(value) {
    return cleanText(value)
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
}

function escapeHtml(value) {
    return cleanText(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function paragraph(value) {
    const text = cleanText(value);
    if (!text) return "";

    return text
        .split(/\n+/)
        .filter(Boolean)
        .map(line => `<p>${escapeHtml(line)}</p>`)
        .join("");
}

async function fetchJson(url) {
    const response = await fetch(url);

    if (!response.ok) {
        throw new Error(`Fetch failed: ${response.status} ${url}`);
    }

    return await response.json();
}

async function loadWorld() {
    if (!currentSlug) {
        showWorldError("No world slug was provided.");
        return;
    }

    try {
        let worldData;

        try {
            worldData = await fetchJson(`${WORLDS_ENDPOINT}/${encodeURIComponent(currentSlug)}`);
        } catch (singleWorldError) {
            const allWorlds = await fetchJson(WORLDS_ENDPOINT);
            worldData = allWorlds.find(world => normalize(world.slug) === normalize(currentSlug));
        }

        if (!worldData || worldData.error) {
            showWorldError("World not found.");
            return;
        }

        currentWorld = worldData;
        document.title = `${currentWorld.name || "World"} | Shared Worlds`;

        renderWorld(currentWorld);
        await loadCharactersForWorld(currentWorld);

    } catch (error) {
        console.error(error);
        showWorldError("Could not load this world.");
    }
}

function showWorldError(message) {
    worldHeaderContent.innerHTML = `
        <section class="profile-card">
            <h1>World Not Found</h1>
            <p>${escapeHtml(message)}</p>
            <a href="../worlds/index.html">Back to Worlds</a>
        </section>
    `;

    worldCharacters.innerHTML = "";
    worldCharacterCount.textContent = "No characters loaded.";
}

function renderWorld(world) {
    const name = world.name || "Unnamed World";
    const banner = getImage(world.banner, "../images/placeholder-banner.png");
    const icon = getImage(world.icon, "../images/placeholder.png");
    const genre = Array.isArray(world.genre) ? world.genre : [];
    const theme = Array.isArray(world.theme) ? world.theme : [];

    worldHeaderContent.innerHTML = `
        <section class="world-title-card profile-card">
            <div class="world-banner-wrap">
                <img class="world-banner" src="${banner}" alt="${escapeHtml(name)} banner">
            </div>

            <div class="world-title-row">
                <img class="world-icon" src="${icon}" alt="${escapeHtml(name)} icon">
                <div>
                    <p class="creator-kicker">World</p>
                    <h1>${escapeHtml(name)}</h1>
                    ${world.shortDescription ? `<p class="tagline">${escapeHtml(world.shortDescription)}</p>` : ""}
                </div>
            </div>

            <div class="creator-pills world-pills">
                ${world.status ? `<span>${escapeHtml(world.status)}</span>` : ""}
                ${world.era ? `<span>${escapeHtml(world.era)}</span>` : ""}
                ${genre.map(item => `<span>${escapeHtml(item)}</span>`).join("")}
                ${theme.map(item => `<span>${escapeHtml(item)}</span>`).join("")}
            </div>
        </section>
    `;

    worldMainCard.classList.remove("hidden");
    worldMainCard.innerHTML = `
        <h2>Overview</h2>
        ${paragraph(world.overview || world.shortDescription || "No overview has been added yet.")}
    `;

    const detailSections = [
        ["Magic System", world.magicSystem],
        ["Technology", world.technology],
        ["Economy", world.economy],
        ["Culture", world.culture]
    ].filter(section => cleanText(section[1]));

    if (detailSections.length) {
        worldDetailsGrid.classList.remove("hidden");
        worldDetailsGrid.innerHTML = detailSections.map(([title, body]) => `
            <section class="profile-card world-detail-card">
                <h2>${escapeHtml(title)}</h2>
                ${paragraph(body)}
            </section>
        `).join("");
    }

    if (world.mapImage) {
        const mapCard = document.createElement("section");
        mapCard.className = "profile-card world-detail-card world-map-card";
        mapCard.innerHTML = `
            <h2>Map</h2>
            <img class="world-map-image" src="${getImage(world.mapImage)}" alt="${escapeHtml(name)} map">
        `;
        worldDetailsGrid.classList.remove("hidden");
        worldDetailsGrid.appendChild(mapCard);
    }
}

async function loadCharactersForWorld(world) {
    const worldName = normalize(world.name);
    const worldSlug = normalize(world.slug);

    const sourceResults = await Promise.allSettled(
        CHARACTER_SOURCES.map(async source => {
            const data = await fetchJson(source.endpoint);

            if (!Array.isArray(data)) {
                throw new Error(`${source.hub} did not return a character list.`);
            }

            return data.map(character => ({
                ...character,
                hub: source.hub,
                hubLabel: source.label,
                characterPath: source.characterPath
            }));
        })
    );

    const loadedCharacters = [];
    const failedSources = [];

    sourceResults.forEach((result, index) => {
        const source = CHARACTER_SOURCES[index];

        if (result.status === "fulfilled") {
            loadedCharacters.push(...result.value);
        } else {
            console.error(`${source.hub} failed to load:`, result.reason);
            failedSources.push(source.hub);
        }
    });

    allCharacters = loadedCharacters;

    const matchingCharacters = allCharacters.filter(character => {
        const characterWorld = normalize(character.world);
        const characterWorldSlug = normalize(character.worldSlug);

        return characterWorld === worldName ||
               characterWorld === worldSlug ||
               characterWorldSlug === worldSlug ||
               characterWorldSlug === worldName;
    });

    renderWorldCharacters(matchingCharacters, failedSources);
}

function renderWorldCharacters(characters, failedSources = []) {
    worldCharacters.innerHTML = "";

    const warning = failedSources.length
        ? ` Could not load: ${failedSources.join(", ")}.`
        : "";

    if (!characters.length) {
        worldCharacters.innerHTML = `<p class='loading'>No StarHub or LunaHub characters are linked to this world yet.${escapeHtml(warning)}</p>`;
        worldCharacterCount.textContent = `0 characters linked.${warning}`;
        return;
    }

    const starCount = characters.filter(character => character.hub === "StarHub").length;
    const lunaCount = characters.filter(character => character.hub === "LunaHub").length;

    worldCharacterCount.textContent = `${characters.length} character${characters.length === 1 ? "" : "s"} linked — ${starCount} StarHub, ${lunaCount} LunaHub.${warning}`;

    characters
        .sort((a, b) => {
            const hubCompare = cleanText(a.hub).localeCompare(cleanText(b.hub));
            if (hubCompare !== 0) return hubCompare;
            return cleanText(a.name).localeCompare(cleanText(b.name));
        })
        .forEach(character => {
            worldCharacters.appendChild(createCharacterCard(character));
        });
}

function createCharacterCard(character) {
    const name = character.name || "Unnamed";
    const slug = character.slug || "";
    const species = character.species || "Unknown Species";
    const icon = getImage(character.icon);

    const card = document.createElement("a");
    card.className = "character-card";
    card.href = `${character.characterPath || "../characters/index.html"}?slug=${encodeURIComponent(slug)}`;

    card.innerHTML = `
        ${character.favorite ? `<span class="favorite-badge">⭐ Favorite</span>` : ""}
        <span class="favorite-badge hub-badge">${escapeHtml(character.hubLabel || character.hub || "Hub")}</span>
        <img src="${icon}" alt="${escapeHtml(name)}">
        <h2>${escapeHtml(name)}</h2>
        <p>${escapeHtml(species)}</p>
    `;

    return card;
}

loadWorld();
</script>

</body>
</html>
