<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StarSundae Character Hub</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>⭐ StarSundae Character Hub ⭐</h1>
    <p>Characters, stories, and memories.</p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search characters...">
</div>

<main>
    <div class="character-grid" id="characterGrid">
        <p class="loading">Loading characters...</p>
    </div>
</main>

<script>

const API_URL = "https://charahub.crysthigpen.workers.dev";

const grid = document.getElementById("characterGrid");
const searchInput = document.getElementById("searchInput");

let allCharacters = [];

/* PUT IT HERE */
function getImage(path) {
    return `${window.location.origin}/${path}`;
}

async function loadCharacters() {

    const response = await fetch(API_URL);

    allCharacters = await response.json();

    renderCharacters(allCharacters);

}

function renderCharacters(characters) {

    grid.innerHTML = "";

    characters.forEach(character => {

        const card = document.createElement("a");

        card.className = "character-card";

        card.href = `characters/${character.slug}.html`;

        card.innerHTML = `
            <img src="${getImage(character.icon)}">
            <h2>${character.name}</h2>
            <p>${character.species}</p>
        `;

        grid.appendChild(card);

    });

}

loadCharacters();

</script>

</body>
</html>
