<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StarSundae Character Hub</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>⭐ StarSundae Character Hub ⭐</h1>
    <p>Characters, stories, and memories.</p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search characters...">
</div>

<main>
    <div class="character-grid" id="characterGrid">
        <p class="loading">Loading characters...</p>
    </div>
</main>

<script>
const API_URL = "https://charahub.crysthigpen.workers.dev";

const grid = document.getElementById("characterGrid");
const searchInput = document.getElementById("searchInput");

let allCharacters = [];

function getImage(path) {
    if (!path) return "images/placeholder.png";
    if (path.startsWith("http")) return path;
    return path;
}

async function loadCharacters() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json();

        if (!Array.isArray(data)) {
            console.error("API did not return a character list:", data);
            grid.innerHTML = "<p class='loading'>The API loaded, but it did not return a character list.</p>";
            return;
        }

        allCharacters = data;
        renderCharacters(allCharacters);

    } catch (error) {
        console.error("Character loading error:", error);
        grid.innerHTML = "<p class='loading'>Could not load characters. Check the Worker URL.</p>";
    }
}

function renderCharacters(characters) {
    grid.innerHTML = "";

    if (!characters || characters.length === 0) {
        grid.innerHTML = "<p class='loading'>No characters found.</p>";
        return;
    }

    characters.forEach(character => {
        const name = character.name || "Unnamed";
        const slug = character.slug || "";
        const species = character.species || "Unknown Species";
        const icon = getImage(character.icon);

        const card = document.createElement("a");
        card.className = "character-card";
        card.href = `characters/${slug}.html`;

        card.innerHTML = `
            <img src="${icon}" alt="${name}">
            <h2>${name}</h2>
            <p>${species}</p>
        `;

        grid.appendChild(card);
    });
}

searchInput.addEventListener("input", function() {
    const searchTerm = searchInput.value.toLowerCase();

    const filtered = allCharacters.filter(character => {
        const name = (character.name || "").toLowerCase();
        const species = (character.species || "").toLowerCase();
        const slug = (character.slug || "").toLowerCase();

        return (
            name.includes(searchTerm) ||
            species.includes(searchTerm) ||
            slug.includes(searchTerm)
        );
    });

    renderCharacters(filtered);
});

loadCharacters();
</script>

</body>
</html>
