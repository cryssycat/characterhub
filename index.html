<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StarSundae Character Hub</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>⭐ StarSundae Character Hub ⭐</h1>
    <p>Characters, stories, and memories.</p>
</header>

<div class="search-container">
    <input
        type="text"
        id="searchInput"
        placeholder="Search characters..."
    >
</div>

<main>
    <div class="character-grid" id="characterGrid">
        <p class="loading">Loading characters...</p>
    </div>
</main>

<script>
const API_URL = "https://charahub.crysthigpen.workers.dev";

const grid = document.getElementById("characterGrid");
const searchInput = document.getElementById("searchInput");

let allCharacters = [];

async function loadCharacters() {
    try {
        const response = await fetch(API_URL);
        allCharacters = await response.json();

        renderCharacters(allCharacters);

    } catch (error) {
        grid.innerHTML = `
            <p class="loading">
                Could not load characters. Check your Worker URL.
            </p>
        `;
        console.error(error);
    }
}

function renderCharacters(characters) {
    grid.innerHTML = "";

    if (!characters.length) {
        grid.innerHTML = `
            <p class="loading">
                No public characters found.
            </p>
        `;
        return;
    }

    characters.forEach(character => {
        const card = document.createElement("a");

        card.className = "character-card";

        card.href = `characters/${character.slug}.html`;

        card.innerHTML = `
            <img 
                src="${character.icon || "images/placeholder.png"}" 
                alt="${character.name}"
            >

            <h2>${character.name}</h2>

            <p>${character.species || "Unknown Species"}</p>
        `;

        grid.appendChild(card);
    });
}

searchInput.addEventListener("input", () => {
    const searchTerm = searchInput.value.toLowerCase();

    const filtered = allCharacters.filter(character => {
        return (
            character.name.toLowerCase().includes(searchTerm) ||
            character.species.toLowerCase().includes(searchTerm) ||
            character.slug.toLowerCase().includes(searchTerm)
        );
    });

    renderCharacters(filtered);
});

loadCharacters();
</script>

</body>
</html>
